name: Daily ECMWF Zarr ingest

# Syncs three ECMWF Zarr time series (airtemp / wind_ns / wind_ew) with the
# current COG state in S3. Reuses the data-agnostic Zarr worker
# (frozon-iss-ingest-zarr) and the env-parameterized runner
# scripts/submit_zarr_pipeline.py — no new algorithm registration. One matrix
# job per variable (independent Zarr stores), so a failure in one doesn't block
# the others.

on:
  schedule:
    # 13:00 UTC — after the ECMWF COG cron (07:00) has long landed, and 30 min
    # off the OSI SAF Zarr cron (12:30) / S1 Zarr cron (12:00) to space out DPS
    # queue contention.
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: airtemp
            cog_collection_id: frozon-ecmwf-airtemp-daily
            zarr_collection_id: frozon-ecmwf-airtemp-zarr
          - product: wind_ns
            cog_collection_id: frozon-ecmwf-wind-ns-daily
            zarr_collection_id: frozon-ecmwf-wind-ns-zarr
          - product: wind_ew
            cog_collection_id: frozon-ecmwf-wind-ew-daily
            zarr_collection_id: frozon-ecmwf-wind-ew-zarr
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # boto3 for COG listing; xarray + zarr + s3fs to read the existing
        # Zarr's time coord from S3; maap-py for submitJob + workspace creds.
        run: pip install maap-py boto3 xarray zarr s3fs

      - name: Sync ${{ matrix.product }} Zarr to COG state
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          COG_COLLECTION_ID: ${{ matrix.cog_collection_id }}
          ZARR_COLLECTION_ID: ${{ matrix.zarr_collection_id }}
          # ECMWF COG filenames are <collection>_YYYYMMDD_COG.tif — note there
          # is NO "_daily_" segment (unlike the S1 default regex), so the date
          # sits directly before _COG.
          TIME_REGEX: '_(?P<start_date>\d{8})_COG'
          # ECMWF COGs are tiny (~3-4 MB); the 32vcpu mosaic queue is overkill.
          QUEUE: "maap-dps-worker-8gb"
        run: python scripts/submit_zarr_pipeline.py
