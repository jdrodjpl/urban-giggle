name: Daily OSI SAF sea-ice ingest

on:
  schedule:
    # 06:45 UTC — 15-min offset from the S1 GRD cron (06:30) and OPERA (06:15)
    # to space out MAAP DPS queue contention across the three COG pipelines.
    - cron: "45 6 * * *"
  workflow_dispatch:
    inputs:
      products:
        description: "Which OSI SAF products to ingest (comma-separated subset of conc,type,edge)."
        default: "conc,type,edge"
      lookback_days:
        description: "Max days to walk back probing THREDDS for published files."
        default: "30"
      ingest_last_n_complete_days:
        description: "How many recent existing dates to ingest per product per run."
        default: "7"
      drop_newest:
        description: "Drop the N newest dates (0 = keep all; OSI SAF files are final on publish)."
        default: "0"
      retain_days:
        description: "Keep the N most recent acquisition-date folders in S3 per collection."
        default: "7"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # requests for THREDDS existence checks; boto3 for S3 retention /
        # pre-check; maap-py for submitJob + workspace credentials.
        run: pip install maap-py boto3 requests

      - name: Discover OSI SAF dates, prune old COGs, submit worker jobs
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          PRODUCTS: ${{ github.event.inputs.products || 'conc,type,edge' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          INGEST_LAST_N_COMPLETE_DAYS: ${{ github.event.inputs.ingest_last_n_complete_days || '7' }}
          DROP_NEWEST: ${{ github.event.inputs.drop_newest || '0' }}
          RETAIN_DAYS: ${{ github.event.inputs.retain_days || '7' }}
        run: python scripts/submit_osisaf_pipeline.py
