name: Daily COG ingest

on:
  schedule:
    # Run daily at 06:15 UTC — offset from Zarr cron by 15 min so they
    # don't compete for MAAP DPS queue slots at the same instant.
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "CMR temporal lookback. The runner discovers which dates have data and picks the N most recent complete ones."
        default: "30"
      mosaic_last_n_complete_days:
        description: "How many recent complete dates to mosaic per run (newest CMR date is dropped as potentially incomplete)."
        default: "7"
      min_granule_fraction:
        description: "Drop any candidate date whose granule count is below this fraction of the max in the discovery window. 0 disables."
        default: "0.5"
      retain_days:
        description: "Keep the N most recent acquisition-date folders in S3; delete the rest. 0 disables."
        default: "7"
      collection_id:
        description: "STAC collection ID"
        default: "frozon-rtc-s1-vh-daily"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # earthaccess is the CMR client; boto3 is used for the S3
        # retention sweep (S3 creds come from maap-py at runtime, no
        # separate AWS secrets needed).
        run: pip install maap-py earthaccess boto3

      - name: Prune old COGs and submit worker jobs
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          MOSAIC_LAST_N_COMPLETE_DAYS: ${{ github.event.inputs.mosaic_last_n_complete_days || '7' }}
          MIN_GRANULE_FRACTION: ${{ github.event.inputs.min_granule_fraction || '0.5' }}
          RETAIN_DAYS: ${{ github.event.inputs.retain_days || '7' }}
          COLLECTION_ID: ${{ github.event.inputs.collection_id || 'frozon-rtc-s1-vh-daily' }}
        run: python scripts/submit_cog_pipeline.py
