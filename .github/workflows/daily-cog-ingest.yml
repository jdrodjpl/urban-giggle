name: Daily COG ingest

on:
  schedule:
    # Run daily at 06:15 UTC — offset from Zarr cron by 15 min so they
    # don't compete for MAAP DPS queue slots at the same instant.
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "CMR temporal lookback. Orchestrator discovers which dates have data and picks the N most recent complete ones."
        default: "30"
      mosaic_last_n_complete_days:
        description: "How many recent complete dates to mosaic per run (newest CMR date is dropped as potentially incomplete)."
        default: "7"
      limit:
        description: "Max granules to fetch (leave blank for no limit)"
        default: ""
      retain_days:
        description: "Keep the N most recent calendar days of COGs (count-based, not a window)"
        default: "7"
      collection_id:
        description: "STAC collection ID"
        default: "frozon-rtc-s1-vh-daily"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maap-py
        run: pip install maap-py

      - name: Submit COG pipeline job
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          MOSAIC_LAST_N_COMPLETE_DAYS: ${{ github.event.inputs.mosaic_last_n_complete_days || '7' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
          RETAIN_DAYS: ${{ github.event.inputs.retain_days || '7' }}
          COLLECTION_ID: ${{ github.event.inputs.collection_id || 'frozon-rtc-s1-vh-daily' }}
        run: python scripts/submit_cog_pipeline.py
