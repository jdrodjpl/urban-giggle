name: Daily CMEMS ocean-current ingest

on:
  schedule:
    # 07:15 UTC — 15-min offset from the ECMWF cron (07:00), well clear of OSI
    # SAF (06:45) / S1 GRD (06:30), to space out MAAP DPS queue contention.
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      products:
        description: "Which CMEMS products to ingest (comma-separated subset of ocean_u,ocean_v)."
        default: "ocean_u,ocean_v"
      ingest_last_n_complete_days:
        description: "How many recent days to ingest per product per run."
        default: "4"
      retain_days:
        description: "Keep the N most recent acquisition-date folders in S3 per collection."
        default: "7"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # boto3 for S3 retention / pre-check; maap-py for submitJob + workspace
        # credentials. No copernicusmarine here — the credentialed subset runs
        # only inside the DPS worker, so the runner stays credential-free.
        run: pip install 'maap-py==4.2.0' boto3 -c .github/constraints.txt

      - name: Discover CMEMS dates, prune old COGs, submit worker jobs
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          PRODUCTS: ${{ github.event.inputs.products || 'ocean_u,ocean_v' }}
          INGEST_LAST_N_COMPLETE_DAYS: ${{ github.event.inputs.ingest_last_n_complete_days || '4' }}
          RETAIN_DAYS: ${{ github.event.inputs.retain_days || '7' }}
        run: python scripts/submit_cmems_pipeline.py
