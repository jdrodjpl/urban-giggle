name: Daily Zarr ingest

on:
  schedule:
    # Run daily at 12:00 UTC — after the COG cron at 06:15 has had time
    # to finish (full-Arctic mosaic workers take 1-2 hours). The Zarr
    # is a synced mirror of the COG state, so it has to run after, not
    # alongside.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      zarr_collection_id:
        description: "Zarr collection / STAC id (also names the Zarr store)."
        default: "frozon-s1-ew-hh-zarr"
      cog_collection_id:
        description: "Source COG collection id (under jdrodrig/frozon/cogs/)."
        default: "frozon-s1-ew-hh-daily"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # boto3 for COG listing; xarray + zarr + s3fs to read the
        # existing Zarr's time coord from S3 without downloading the
        # whole store; maap-py for submitJob + workspace credentials.
        run: pip install 'maap-py==4.2.0' boto3 xarray zarr s3fs -c .github/constraints.txt

      - name: Diff COG state vs existing Zarr and submit sync job
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          ZARR_COLLECTION_ID: ${{ github.event.inputs.zarr_collection_id || 'frozon-s1-ew-hh-zarr' }}
          COG_COLLECTION_ID: ${{ github.event.inputs.cog_collection_id || 'frozon-s1-ew-hh-daily' }}
        run: python scripts/submit_zarr_pipeline.py
