name: Daily Zarr ingest

on:
  schedule:
    # Run daily at 06:00 UTC — gives OPERA RTC ~6 days of processing
    # lag before the window captures the latest available granules.
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manual trigger from the Actions tab for testing / ad-hoc runs.
    inputs:
      temporal_window_days:
        description: "Temporal search window in days (default 14)"
        default: "14"
      limit:
        description: "Max granules to fetch (leave blank for no limit)"
        default: ""
      retain_days:
        description: "Keep the N most recent calendar days of Zarr slices (count-based, not a window)"
        default: "7"
      collection_id:
        description: "STAC collection ID (also names the Zarr)"
        default: "frozon-s1-zarr"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maap-py
        run: pip install maap-py

      - name: Submit Zarr pipeline job
        env:
          MAAP_TOKEN: ${{ secrets.MAAP_TOKEN }}
          MAAP_HOST: "api.maap-project.org"
          # Override defaults from workflow_dispatch inputs (if provided)
          TEMPORAL_WINDOW_DAYS: ${{ github.event.inputs.temporal_window_days || '14' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
          RETAIN_DAYS: ${{ github.event.inputs.retain_days || '7' }}
          COLLECTION_ID: ${{ github.event.inputs.collection_id || 'frozon-s1-zarr' }}
        run: python scripts/submit_zarr_pipeline.py
