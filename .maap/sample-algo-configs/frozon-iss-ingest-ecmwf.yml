algorithm_description: Frozon ECMWF Open Data ingest worker — retrieves one near-surface field (2 m air temperature, 10 m northward wind, or 10 m eastward wind) for one date from the ECMWF Open Data real-time IFS feed (anonymous byte-range via ecmwf-opendata), extracts the step-0 analysis field, rolls the global 0..360 grid onto −180..180, reprojects to the canonical EPSG:3413 Arctic grid, writes a COG, uploads to S3.
algorithm_name: frozon-iss-ingest-ecmwf
algorithm_version: v1
build_command: urban-giggle/.maap/ingest-ecmwf/build.sh
disk_space: 20GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: ""
    description: ECMWF product to ingest — one of airtemp (2t) | wind_ns (10v) | wind_ew (10u).
    name: product
    required: true
  - default: ""
    description: Forecast reference date YYYYMMDD.
    name: date
    required: true
  - default: "0"
    description: Forecast reference run hour UTC (0 | 6 | 12 | 18). Default 0 (00z).
    name: time
    required: false
  - default: "0"
    description: Forecast lead-time step in hours. Default 0 (T+0 analysis / daily snapshot).
    name: step
    required: false
  - default: "0p25"
    description: Open Data grid resolution (default 0p25).
    name: resol
    required: false
  - default: ""
    description: STAC collection ID / S3 folder. Defaults to the per-product collection (frozon-ecmwf-{airtemp,wind-ns,wind-ew}-daily) when blank.
    name: collection_id
    required: false
  - default: ""
    description: Target S3 bucket for the COG output.
    name: s3_bucket
    required: true
  - default: ""
    description: Optional S3 prefix within the output bucket.
    name: s3_prefix
    required: false
  - default: ""
    description: AWS IAM Role ARN to assume for S3 write (optional — defaults to worker's identity).
    name: role_arn
    required: false
  - default: DEFLATE
    description: COG compression method (DEFLATE, LZW, JPEG, WEBP, NONE).
    name: compress
    required: false
  - default: "512"
    description: COG tile block size (256, 512, 1024).
    name: blocksize
    required: false
  - default: "512"
    description: GDAL_CACHEMAX in MB for the COG conversion subprocess (files are tiny — 512 is ample).
    name: max_memory
    required: false
  - default: "false"
    description: Overwrite existing local COG output (S3 dedupe is enforced runner-side).
    name: overwrite
    required: false
queue: maap-dps-worker-8gb
repository_url: https://github.com/jdrodjpl/urban-giggle.git
run_command: urban-giggle/.maap/ingest-ecmwf/run-ingest-ecmwf.sh
