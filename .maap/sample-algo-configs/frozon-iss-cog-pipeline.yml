algorithm_description: Frozon ISS COG Pipeline — orchestrates per-TIFF COG ingest jobs and STAC cataloging.
algorithm_name: frozon-iss-cog-pipeline
algorithm_version: main
build_command: urban-giggle/.maap/cog-pipeline/build.sh
disk_space: 20GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: none
    description: S3 URL of a single TIFF input (mutually exclusive with input_s3_prefix)
    name: input_s3
    required: false
  - default: none
    description: S3 prefix containing TIFF inputs (each gets its own DPS job)
    name: input_s3_prefix
    required: false
  - default: none
    description: STAC collection ID for the products
    name: collection_id
    required: true
  - default: none
    description: Target S3 bucket for COG outputs
    name: s3_bucket
    required: true
  - default: ""
    description: Optional S3 prefix within the output bucket
    name: s3_prefix
    required: false
  - default: none
    description: AWS IAM Role ARN to assume for S3 read/write
    name: role_arn
    required: true
  - default: none
    description: Host for logging pipeline messages
    name: cmss_logger_host
    required: false
  - default: none
    description: Host for cataloging STAC items
    name: mmgis_host
    required: false
  - default: none
    description: MAAP secret name for MMGIS host token
    name: titiler_token_secret_name
    required: false
  - default: api.maap-project.org
    description: MAAP API host
    name: maap_host
    required: false
  - default: DEFLATE
    description: COG compression method (DEFLATE, LZW, JPEG, WEBP, NONE)
    name: compress
    required: false
  - default: "512"
    description: COG tile block size (256, 512, 1024)
    name: blocksize
    required: false
  - default: "4096"
    description: GDAL_CACHEMAX in MB propagated to each worker subprocess. Matches the worker YAML default; 4GB suits full-Arctic daily mosaics on the 64GB queue.
    name: max_memory
    required: false
  - default: nearest
    description: Resampling method for base data
    name: resampling
    required: false
  - default: average
    description: Resampling method for overviews
    name: overview_resampling
    required: false
  - default: "false"
    description: Overwrite existing COG outputs in S3
    name: overwrite
    required: false
  - default: "true"
    description: Upsert items into existing STAC collections (true/false). Defaults true so reruns merge into the existing catalog.
    name: upsert
    required: false
  - default: none
    description: Optional webhook URL POSTed after each STAC item upsert. Receiver is expected to fetch the COG from S3.
    name: post_stac_webhook_url
    required: false
  - default: none
    description: Optional MAAP secret name holding a bearer token for the post-STAC webhook.
    name: post_stac_webhook_token_secret_name
    required: false
  - default: none
    description: Glob filter pattern for input_s3_prefix discovery (e.g. "*ssha*.tif")
    name: filter
    required: false
  - default: none
    description: Maximum number of TIFF files to process (testing)
    name: limit
    required: false
  - default: output
    description: Local working directory for the orchestrator
    name: local_download_path
    required: false
  - default: s3
    description: Input source type ('s3' uses input_s3_prefix; 'cmr' uses cmr_* params)
    name: input_source_type
    required: false
  - default: ""
    description: CMR collection short_name (required when input_source_type=cmr)
    name: cmr_short_name
    required: false
  - default: ""
    description: CMR collection version
    name: cmr_version
    required: false
  - default: ""
    description: ISO datetime lower bound for CMR temporal filter (e.g. 2024-01-01)
    name: cmr_temporal_start
    required: false
  - default: ""
    description: ISO datetime upper bound for CMR temporal filter
    name: cmr_temporal_end
    required: false
  - default: ""
    description: CMR bbox as 'west,south,east,north' (degrees)
    name: cmr_bbox
    required: false
  - default: ""
    description: Comma-separated CMR granule UR identifiers (overrides temporal/bbox)
    name: cmr_granule_ids
    required: false
  - default: "true"
    description: Prefer HTTPS granule URLs (requires EDL token) vs. in-region S3 links
    name: cmr_prefer_https
    required: false
  - default: ""
    description: MAAP secret name holding the EDL bearer token (or username\npassword)
    name: earthdata_token_secret_name
    required: false
  - default: ""
    description: Regex with named group 'start_date' used to extract YYYYMMDD from input filenames so the orchestrator can group inputs into per-date daily mosaics. Empty disables grouping (each input becomes its own COG).
    name: time_regex
    required: false
  - default: ""
    description: If set (YYYY-MM-DD or YYYYMMDD), the orchestrator drops any date bucket strictly past this date before submitting workers. Lets the cron prevent partial-day mosaics from granules acquired after the safe-landing target.
    name: max_acquisition_date
    required: false
  - default: "0"
    description: If > 0, after grouping by date the orchestrator drops the single newest date (assumed potentially incomplete) and keeps only the next N most recent dates. Cron uses this to self-discover the safe-landing boundary instead of betting on a fixed offset.
    name: mosaic_last_n_complete_days
    required: false
  - default: "0"
    description: If > 0, keep only the N most recent calendar days of COG outputs in S3 after cataloging; delete the rest.
    name: retain_days
    required: false
  - default: ""
    description: Optional SCP delivery host (IP or DNS); enables post-S3 SCP push from each worker
    name: scp_host
    required: false
  - default: "22"
    description: SCP port
    name: scp_port
    required: false
  - default: ""
    description: SCP username
    name: scp_user
    required: false
  - default: ""
    description: SCP remote directory (COG lands as <dir>/<filename>, path flattened)
    name: scp_remote_dir
    required: false
  - default: ""
    description: MAAP secret name holding the SSH private key (PEM)
    name: scp_key_secret_name
    required: false
queue: maap-dps-worker-8gb
repository_url: https://github.com/jdrodjpl/urban-giggle.git
run_command: urban-giggle/.maap/cog-pipeline/run-cog-pipeline.sh
