algorithm_description: Frozon ISS Zarr Ingest Worker — builds or upserts a sparse Zarr time series in S3 from a batch of TIFF inputs.
algorithm_name: frozon-iss-ingest-zarr
algorithm_version: v3
build_command: urban-giggle/.maap/ingest-zarr/build.sh
disk_space: 200GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: none
    description: S3 prefix containing TIFF inputs to merge into the Zarr
    name: input_s3_prefix
    required: true
  - default: none
    description: STAC collection ID; also names the output Zarr (<collection-id>.zarr)
    name: collection_id
    required: true
  - default: none
    description: Target S3 bucket for the Zarr output
    name: s3_bucket
    required: true
  - default: ""
    description: Optional S3 prefix within the output bucket
    name: s3_prefix
    required: false
  - default: none
    description: AWS IAM Role ARN to assume for S3 read/write
    name: role_arn
    required: true
  - default: none
    description: Regex with named group 'start_date' (or first capture) to extract datetime from TIFF filenames
    name: time_regex
    required: false
  - default: "1024"
    description: Zarr spatial chunk size
    name: chunk_size
    required: false
  - default: none
    description: Glob filter for input filenames (e.g. "*ssha*.tif")
    name: filter
    required: false
  - default: none
    description: Glob exclude for input filenames
    name: exclude
    required: false
  - default: none
    description: Maximum number of new TIFFs to process (testing)
    name: limit
    required: false
  - default: "true"
    description: When new inputs extend beyond the existing Zarr's grid, dump existing slices and rebuild on the union grid (true/false). False makes out-of-bounds inputs a fatal error.
    name: allow_bounds_expansion
    required: false
  - default: ""
    description: JSON list of Earthdata-protected HTTPS URLs (populated by the orchestrator from CMR search)
    name: input_https_urls
    required: false
  - default: ""
    description: MAAP secret name holding EDL bearer token (or username\npassword); required for input_https_urls
    name: earthdata_token_secret_name
    required: false
  - default: ""
    description: JSON list of explicit s3:// URIs to ingest as new time slices (sync mode — runner-side flow).
    name: input_s3_urls
    required: false
  - default: ""
    description: Comma-separated YYYYMMDD list. When set, worker runs in sync mode — Zarr's final time dim becomes exactly this set (existing slices outside it are dropped, new ones from --input-s3-urls are added).
    name: desired_dates
    required: false
  - default: "0"
    description: If > 0, keep only the N most recent calendar days of Zarr slices after build/append; drop the rest
    name: retain_days
    required: false
queue: maap-dps-worker-16gb
repository_url: https://github.com/jdrodjpl/urban-giggle.git
run_command: urban-giggle/.maap/ingest-zarr/run-ingest-zarr.sh
