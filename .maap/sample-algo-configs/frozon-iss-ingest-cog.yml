algorithm_description: Frozon ISS COG Ingest Worker — converts a single TIFF input to a Cloud Optimized GeoTIFF and uploads it to S3 with a STAC catalog.
algorithm_name: frozon-iss-ingest-cog
algorithm_version: main
build_command: urban-giggle/.maap/ingest-cog/build.sh
disk_space: 200GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: none
    description: S3 URL of the input TIFF file
    name: input_s3
    required: false
  - default: none
    description: HTTPS URL of the input TIFF (Earthdata-protected; requires earthdata_token_secret_name)
    name: input_https
    required: false
  - default: ""
    description: JSON list of S3 URLs to mosaic into a single daily COG (populated by orchestrator)
    name: input_s3_urls
    required: false
  - default: ""
    description: JSON list of HTTPS+EDL URLs to mosaic into a single daily COG (populated by orchestrator)
    name: input_https_urls
    required: false
  - default: ""
    description: YYYYMMDD used to name the daily mosaic output and stamp its STAC datetime
    name: mosaic_date
    required: false
  - default: ""
    description: MAAP secret name holding an EDL bearer token (required for input_https / input_https_urls / cmr_short_name)
    name: earthdata_token_secret_name
    required: false
  - default: ""
    description: CMR collection short_name. When set with mosaic_date, worker re-queries CMR for that date and downloads (avoids submitJob payload-size limit on huge URL lists)
    name: cmr_short_name
    required: false
  - default: ""
    description: CMR collection version (optional)
    name: cmr_version
    required: false
  - default: ""
    description: CMR temporal start (ISO date, narrowed to the mosaic date)
    name: cmr_temporal_start
    required: false
  - default: ""
    description: CMR temporal end (ISO date, day after mosaic date)
    name: cmr_temporal_end
    required: false
  - default: ""
    description: CMR bbox 'west,south,east,north'
    name: cmr_bbox
    required: false
  - default: "true"
    description: Prefer HTTPS granule URLs (require EDL token) vs in-region S3
    name: cmr_prefer_https
    required: false
  - default: ""
    description: Glob filter applied to CMR results (e.g. "*VH*.tif")
    name: filter
    required: false
  - default: ""
    description: Cap on CMR results (for testing); newest-first
    name: limit
    required: false
  - default: none
    description: STAC collection ID
    name: collection_id
    required: true
  - default: none
    description: Target S3 bucket for the COG output
    name: s3_bucket
    required: true
  - default: ""
    description: Optional S3 prefix within the output bucket
    name: s3_prefix
    required: false
  - default: none
    description: AWS IAM Role ARN to assume for S3 read/write
    name: role_arn
    required: true
  - default: DEFLATE
    description: COG compression method (DEFLATE, LZW, JPEG, WEBP, NONE)
    name: compress
    required: false
  - default: "512"
    description: COG tile block size (256, 512, 1024)
    name: blocksize
    required: false
  - default: "4096"
    description: GDAL_CACHEMAX in MB for the conversion subprocess (defaults to 4GB to suit full-Arctic daily mosaics on the 64GB queue; lower for small inputs on smaller queues)
    name: max_memory
    required: false
  - default: nearest
    description: Resampling method for base data (nearest, bilinear, cubic, average)
    name: resampling
    required: false
  - default: average
    description: Resampling method for overviews (nearest, average, cubic, mode)
    name: overview_resampling
    required: false
  - default: "false"
    description: Overwrite existing COG output in S3
    name: overwrite
    required: false
  - default: ""
    description: Optional SCP delivery host (IP or DNS); enables post-S3 SCP push
    name: scp_host
    required: false
  - default: "22"
    description: SCP port
    name: scp_port
    required: false
  - default: ""
    description: SCP username
    name: scp_user
    required: false
  - default: ""
    description: SCP remote directory (COG lands as <dir>/<filename>, path flattened)
    name: scp_remote_dir
    required: false
  - default: ""
    description: MAAP secret name holding the SSH private key (PEM)
    name: scp_key_secret_name
    required: false
queue: maap-dps-worker-8gb
repository_url: https://github.com/jdrodjpl/urban-giggle.git
run_command: urban-giggle/.maap/ingest-cog/run-ingest-cog.sh
