algorithm_description: Frozon ISS Zarr Pipeline — orchestrates a single Zarr ingest worker job and STAC cataloging.
algorithm_name: frozon-iss-zarr-pipeline
algorithm_version: main
build_command: urban-giggle/.maap/zarr-pipeline/build.sh
disk_space: 20GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: ""
    description: S3 prefix containing TIFF inputs to merge into the Zarr (used when input_source_type=s3)
    name: input_s3_prefix
    required: false
  - default: none
    description: STAC collection ID
    name: collection_id
    required: true
  - default: none
    description: Target S3 bucket for the Zarr output
    name: s3_bucket
    required: true
  - default: ""
    description: Optional S3 prefix within the output bucket
    name: s3_prefix
    required: false
  - default: none
    description: AWS IAM Role ARN to assume for S3 read/write
    name: role_arn
    required: true
  - default: none
    description: Host for logging pipeline messages
    name: cmss_logger_host
    required: false
  - default: none
    description: Host for cataloging STAC items
    name: mmgis_host
    required: false
  - default: none
    description: MAAP secret name for MMGIS host token
    name: titiler_token_secret_name
    required: false
  - default: api.maap-project.org
    description: MAAP API host
    name: maap_host
    required: false
  - default: none
    description: Regex extracting datetime from TIFF filenames (named 'start_date' group or first capture)
    name: time_regex
    required: false
  - default: "1024"
    description: Zarr spatial chunk size
    name: chunk_size
    required: false
  - default: none
    description: Glob filter for input filenames
    name: filter
    required: false
  - default: none
    description: Glob exclude for input filenames
    name: exclude
    required: false
  - default: none
    description: Cap number of new TIFFs (testing)
    name: limit
    required: false
  - default: "true"
    description: Rebuild on expanded bounds when new inputs extend beyond existing grid (true/false)
    name: allow_bounds_expansion
    required: false
  - default: "true"
    description: Upsert STAC items into existing collections (true/false). Default true so reruns merge into the catalog.
    name: upsert
    required: false
  - default: none
    description: Optional webhook URL POSTed after STAC item upsert. Receiver fetches the Zarr from S3.
    name: post_stac_webhook_url
    required: false
  - default: none
    description: Optional MAAP secret name for the post-STAC webhook bearer token.
    name: post_stac_webhook_token_secret_name
    required: false
  - default: s3
    description: How to resolve inputs ('s3' uses input_s3_prefix, 'cmr' uses cmr_* params)
    name: input_source_type
    required: false
  - default: ""
    description: CMR collection short_name (required when input_source_type=cmr)
    name: cmr_short_name
    required: false
  - default: ""
    description: CMR collection version
    name: cmr_version
    required: false
  - default: ""
    description: ISO datetime lower bound for CMR temporal filter
    name: cmr_temporal_start
    required: false
  - default: ""
    description: ISO datetime upper bound for CMR temporal filter
    name: cmr_temporal_end
    required: false
  - default: ""
    description: CMR bbox 'west,south,east,north' (degrees)
    name: cmr_bbox
    required: false
  - default: ""
    description: Comma-separated CMR granule UR identifiers
    name: cmr_granule_ids
    required: false
  - default: "true"
    description: Prefer HTTPS granule URLs (requires EDL token) vs. in-region S3 links
    name: cmr_prefer_https
    required: false
  - default: ""
    description: MAAP secret name holding EDL bearer token (or username\npassword)
    name: earthdata_token_secret_name
    required: false
  - default: "0"
    description: If > 0, keep only the N most recent calendar days of Zarr slices after build/append; drop the rest
    name: retain_days
    required: false
queue: maap-dps-worker-8gb
repository_url: https://github.com/jdrodjpl/urban-giggle.git
run_command: urban-giggle/.maap/zarr-pipeline/run-zarr-pipeline.sh
